<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- OPEN GRAPH TAGS (Untuk Preview WhatsApp/Social Media) -->
    <meta property="og:title" content="Dimsum Mama Andra - Menu Online" />
    <meta property="og:description" content="Pesan via Menu Online x WhatsApp lebih mudah & praktis!" />
    
    <!-- Link gambar menggunakan domain produksi GitHub Pages Anda (Wajib HTTPS & Case-Sensitive) -->
    <meta property="og:image" content="https://mama-andra.github.io/e-menu/banner3.jpg" />
    <meta property="og:image:secure_url" content="https://mama-andra.github.io/e-menu/banner3.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Banner Dimsum Mama Andra" />
    
    <!-- Link alternatif (fallback) untuk legacy crawler device lama -->
    <link rel="image_src" href="https://mama-andra.github.io/e-menu/banner3.jpg" />
    <meta itemprop="image" content="https://mama-andra.github.io/e-menu/banner3.jpg" />
    
    <!-- og:url harus sama persis dengan alamat web yang Anda sebar di WhatsApp -->
    <meta property="og:url" content="https://mama-andra.github.io/e-menu/" />
    <meta property="og:type" content="website" />

    <!-- ⚠️ SOLUSI: Menggunakan JavaScript Redirect (Aman untuk Crawler WhatsApp) -->
    <script>
        // Mengalihkan pengguna setelah 1 detik (1000 milidetik)
        // Menggunakan location.replace agar halaman redirect ini tidak menyampah di history "Back" browser pelanggan
        setTimeout(function() {
            window.location.replace("https://mama-andra.blogspot.com/");
        }, 1000);
    </script>

    <title>Dimsum Mama Andra - Redirecting...</title>

    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #0f172a; 
            color: white; 
            margin: 0;
        }
        .loader { 
            text-align: center; 
        }
        .loader h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .loader p {
            color: #94a3b8;
        }
        .loader a {
            color: #22c55e;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="loader">
        <h1>Mengarahkan ke Menu...</h1>
        <p>Silakan tunggu atau <a href="https://mama-andra.blogspot.com/">klik di sini</a> jika tidak dialihkan otomatis.</p>
    </div>
</body>
</html>
