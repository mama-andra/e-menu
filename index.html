  <style>
    /* Mengunci gulir browser utama agar tidak rubber-band / bergetar di iOS Safari */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #F4F7F5; /* Tema Matcha Mint Cream khas Mama Andra Store */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* Iframe menutupi penuh satu layar tanpa celah/border */
    iframe {
      border: none;
      width: 100%;
      height: 100%;
      display: block;
      margin: 0;
      padding: 0;
    }

    /* Screen Preloader Premium khas Zettbos */
    #preloader {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #F4F7F5;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s ease-out;
    }

    .loader-card {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(46, 111, 64, 0.1);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 28px;
      box-shadow: 0 10px 30px rgba(46, 111, 64, 0.08);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      width: 250px;
    }

    /* Animasi Spinner Ring Bertema Matcha */
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(46, 111, 64, 0.1);
      border-top: 4px solid #2E6F40;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loader-title {
      font-size: 15px;
      font-weight: 700;
      color: #1A2E22;
      letter-spacing: 0.05em;
      margin: 0;
    }

    .loader-subtitle {
      font-size: 9px;
      color: #5A6F62;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-weight: 600;
      margin: 0;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Screen Preloader (Mencegah layar berkedip putih saat iframe memuat server Google) -->
  <div id="preloader">
    <div class="loader-card">
      <div class="spinner"></div>
      <div>
        <h3 class="loader-title">MAMA ANDRA</h3>
        <p class="loader-subtitle">Menghubungkan Domain Premium...</p>
      </div>
    </div>
  </div>

  <!-- IFRAME WRAPPER UTAMA -->
  <!-- sandbox disesuaikan agar performa aman & popup transaksi WhatsApp di iOS lancar -->
  <iframe 
    id="gasFrame"
    src="https://script.google.com/macros/s/AKfycbx2HjWKb8_HPzY7kJY7uH_0xDXXk2w4i9o9QVDvFGBbwdoaldx4KFcaYZ-7m0i6BX2y6w/exec" 
    allow="geolocation; microphone; camera"
    sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals allow-downloads">
  </iframe>

  <script>
    const frame = document.getElementById('gasFrame');
    const preloader = document.getElementById('preloader');

    // Menghilangkan preloader begitu iframe selesai memuat isi webapp Google
    frame.onload = function() {
      preloader.style.opacity = '0';
      setTimeout(function() {
        preloader.style.display = 'none';
      }, 500);
    };

    // Fallback Pengaman: Hilangkan preloader setelah 4.5 detik jika koneksi internet klien lambat
    setTimeout(function() {
      if (preloader.style.display !== 'none') {
        preloader.style.opacity = '0';
        setTimeout(function() {
          preloader.style.display = 'none';
        }, 500);
      }
    }, 4500);
  </script>
</body>
</html>
